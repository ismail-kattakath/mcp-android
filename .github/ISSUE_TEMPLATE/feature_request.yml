name: Feature Request
description: Suggest a new tool or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please check [open issues](https://github.com/ismail-kattakath/mcp-android/issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you are running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What tool name, inputs, and output would you expect?
      placeholder: |
        New tool: android.screen.record
        Inputs: serial, durationSeconds, outputPath
        Returns: path to the recorded MP4 on the host
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds using existing tools?
