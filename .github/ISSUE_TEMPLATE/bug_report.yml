name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out all sections.

  - type: dropdown
    id: transport
    attributes:
      label: Connection Method
      options:
        - Docker (USB passthrough)
        - Docker (WiFi ADB / ADB_SERVER_HOST)
        - npx
        - node dist/index.js (direct)
    validations:
      required: true

  - type: dropdown
    id: streaming
    attributes:
      label: scrcpy streaming enabled?
      options:
        - "Yes (SCRCPY_SERVER_PATH set)"
        - "No (snapshot/ADB-only mode)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call tool android.vision.startStream with serial '...'
        2. ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message or stderr output
      render: shell

  - type: input
    id: device
    attributes:
      label: Android device model and OS version
      placeholder: "Pixel 7, Android 14 (API 34)"

  - type: input
    id: host_os
    attributes:
      label: Host OS
      placeholder: "macOS 15.3, Ubuntu 22.04, Windows 11"

  - type: input
    id: version
    attributes:
      label: mcp-android version
      placeholder: "1.0.0"
    validations:
      required: true
